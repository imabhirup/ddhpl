<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DDHPL Leaderboard</title>

  <link rel="stylesheet" href="styles.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

<div class="app">

  <!-- Header -->
  <div class="header">
    <div class="header-top">
      <h2>🏏 DDHPL T20 League</h2>
      <button onclick="refreshData()" class="refresh-btn">🔄 Refresh</button>
    </div>

    <div class="header-bottom">
      <p class="status">🔴 Live</p>
      <p class="matches" id="matches-played"></p>
    </div>
  </div>

  <!-- Contest -->
  <section class="contest" aria-label="DDHPL Contest">

    <div class="hall-of-fame" aria-label="Hall of Fame">
      <div class="hall-header">
        <h3>🏆 Hall of Fame</h3>
        <div class="hall-controls" aria-label="Hall of Fame Controls">
          <button class="hall-nav prev" id="hall-prev" type="button" aria-label="Previous achievement">◀</button>
          <button class="hall-nav next" id="hall-next" type="button" aria-label="Next achievement">▶</button>
        </div>
      </div>

      <div class="hall-carousel" id="hall-carousel">
        <div class="hall-track" id="hall-track">
          <article class="hof-card" id="achievement-champion" data-achievement="champion">
            <div class="hof-top">
              <span class="hall-icon">🥇</span>
              <h4>Champion</h4>
            </div>
            <p class="hall-player" id="champion-name">--</p>
            <p class="hall-stat" id="champion-total">--</p>
          </article>

          <article class="hof-card" id="achievement-highest-score" data-achievement="highestScore">
            <div class="hof-top">
              <span class="hall-icon">⚡</span>
              <h4>Highest Score</h4>
            </div>
            <p class="hall-player" id="highest-score-name">--</p>
            <p class="hall-stat" id="highest-score-points">--</p>
          </article>

          <article class="hof-card" id="achievement-lowest-score" data-achievement="lowestScore">
            <div class="hof-top">
              <span class="hall-icon">🔻</span>
              <h4>Lowest Score</h4>
            </div>
            <p class="hall-player" id="lowest-score-name">--</p>
            <p class="hall-stat" id="lowest-score-points">--</p>
          </article>

          <article class="hof-card" id="achievement-consistency-king" data-achievement="consistencyKing">
            <div class="hof-top">
              <span class="hall-icon">🔥</span>
              <h4>Consistency King</h4>
            </div>
            <p class="hall-player" id="consistency-king-name">--</p>
            <p class="hall-stat" id="consistency-king-stat">--</p>
          </article>

          <article class="hof-card" id="achievement-explosive-player" data-achievement="explosivePlayer">
            <div class="hof-top">
              <span class="hall-icon">💣</span>
              <h4>Explosive Player</h4>
            </div>
            <p class="hall-player" id="explosive-player-name">--</p>
            <p class="hall-stat" id="explosive-player-count">--</p>
          </article>

          <article class="hof-card" id="achievement-lowest-performer" data-achievement="lowestPerformer">
            <div class="hof-top">
              <span class="hall-icon">😬</span>
              <h4>Lowest Performer</h4>
            </div>
            <p class="hall-player" id="lowest-performer-name">--</p>
            <p class="hall-stat" id="lowest-performer-stat">--</p>
          </article>

          <article class="hof-card" id="achievement-most-missed" data-achievement="mostMissed">
            <div class="hof-top">
              <span class="hall-icon">🚨</span>
              <h4>Most Missed Matches</h4>
            </div>
            <p class="hall-player" id="most-missed-name">--</p>
            <p class="hall-stat" id="most-missed-stat">--</p>
          </article>
        </div>
      </div>
    </div>
  </section>

  <!-- Update -->
  <div class="update-bar" id="update-bar"></div>

  <!-- Leaderboard -->
  <div class="leaderboard">

    <div class="leaderboard-header">
      <span>All Participants</span>
      <span>Points</span>
      <span>Rank</span>
    </div>

    <div id="list"></div>
  </div>

</div>

<!-- Modal -->
<div id="modal" class="modal">
  <div class="modal-box">
    <span class="close" onclick="closeModal()">×</span>
    <div id="modal-content"></div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
