name: Update JSON & Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  update-json:
    # Prevent infinite loop when bot commits
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history (safe)

      - name: Detect current.json changes
        id: check_file
        run: |
          echo "Checking file changes..."

          # Handle first commit case
          if [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            echo "First commit detected"
            echo "changed=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Check if current.json changed
          if git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep -q "current.json"; then
            echo "current.json changed"
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "current.json NOT changed"
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        if: steps.check_file.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Run merge script
        if: steps.check_file.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        run: node scripts/updateData.js

      - name: Commit updated data.json
        if: steps.check_file.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data.json

          # Only commit if changes exist
          if ! git diff --cached --quiet; then
            git commit -m "Auto update data.json from current.json"
            git push
          else
            echo "No changes to commit"
          fi

  deploy:
    needs: update-json
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./