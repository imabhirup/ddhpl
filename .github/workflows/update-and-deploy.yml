name: Update JSON & Deploy

on:
  push:
    branches:
      - main

jobs:
  update-json:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Check if current.json changed
        id: check_file
        run: |
          git fetch origin main
          if git diff --name-only HEAD~1 HEAD | grep -q "current.json"; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        if: steps.check_file.outputs.changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Run merge script
        if: steps.check_file.outputs.changed == 'true'
        run: node scripts/updateData.js

      - name: Commit updated data.json
        if: steps.check_file.outputs.changed == 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data.json
          git diff --cached --quiet || git commit -m "Auto update data.json from current.json"
          git push

  deploy:
    needs: update-json
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./