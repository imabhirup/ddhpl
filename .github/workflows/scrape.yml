name: Update IPL Live Match

on:
  schedule:
    - cron: "*/2 * * * *"   # every 2 minutes
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout
        uses: actions/checkout@v3

      # 2. Setup Node
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      # 3. Install dependencies
      - name: Install packages
        run: npm install axios cheerio

      # 4. Run scraper
      - name: Run scraper
        run: node scrape.js

      # 5. Commit updated JSON
      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add live.json
          git commit -m "Update live IPL match" || echo "No changes"
          git push